name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Build, test, and vet
        run: task check


  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - uses: ko-build/setup-ko@v0.9

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build and push image with ko
        env:
          KO_DOCKER_REPO: ghcr.io/akhenakh/nacbor
        run: |
          TAGS="--tags ${{ github.ref_name }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="$TAGS --tags latest"
          fi
          ko build --bare $TAGS .
