version: '3'

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}
  BINARY: bin/nacbor

tasks:
  default:
    desc: Build the nacbor binary
    cmds:
      - task: build

  build:
    desc: Build the nacbor binary with version ldflags
    sources:
      - '*.go'
      - internal/**/*.go
      - go.mod
    generates:
      - '{{.BINARY}}'
    cmds:
      - cmd: go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY}} .

  install:
    desc: Install nacbor to $GOBIN (no cmd/ indirection — root package)
    cmds:
      - cmd: go install -ldflags "{{.LDFLAGS}}" github.com/akhenakh/nacbor

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin

  check:
    desc: Build, test, and vet (CI-style)
    cmds:
      - task: build
      - task: test
      - task: vet