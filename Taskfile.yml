version: '3'

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}

tasks:
  default:
    desc: Build the nacbor and nacborui binaries
    cmds:
      - task: build

  build:
    desc: Build the nacbor and nacborui binaries with version ldflags
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - go.mod
    generates:
      - bin/nacbor
      - bin/nacborui
    cmds:
      - cmd: go build -ldflags "{{.LDFLAGS}}" -o bin/nacbor ./cmd/nacbor
      - cmd: go build -ldflags "{{.LDFLAGS}}" -o bin/nacborui ./cmd/nacborui

  install:
    desc: Install nacbor and nacborui to $GOBIN
    cmds:
      - cmd: go install -ldflags "{{.LDFLAGS}}" github.com/akhenakh/nacbor/cmd/nacbor
      - cmd: go install -ldflags "{{.LDFLAGS}}" github.com/akhenakh/nacbor/cmd/nacborui

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin

  check:
    desc: Build, test, and vet (CI-style)
    cmds:
      - task: build
      - task: test
      - task: vet